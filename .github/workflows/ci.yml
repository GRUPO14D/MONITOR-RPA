name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ------------------------------------------------------------------ #
  # Typecheck + Test: Frontend                                          #
  # ------------------------------------------------------------------ #
  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ------------------------------------------------------------------ #
  # Typecheck + Test: Backend                                           #
  # ------------------------------------------------------------------ #
  backend:
    name: Backend (typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: back-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
